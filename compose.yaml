# Docker Compose for VK Portfolio - Synology NAS / Docker deployment
# Credentials are loaded from a persistent env file outside the git repo:
#   /volume1/docker/dockhand/vk-web-claude.env
# Copy .env.example there and fill in your real values.
# Docker image is built automatically via GitHub Actions on every push to main.

services:

  # 1. MariaDB Database
  portfolio-db:
    image: mariadb:lts
    env_file:
      - /volume1/docker/dockhand/vk-web-claude.env
    volumes:
      - portfolio-db-data:/var/lib/mysql
    networks:
      - portfolio-network
    restart: always
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Portfolio Web Server (pre-built image from GitHub Container Registry)
  portfolio-web:
    image: ghcr.io/vinamrak17/vk-website-claude:latest
    pull_policy: always
    depends_on:
      portfolio-db:
        condition: service_healthy
    env_file:
      - /volume1/docker/dockhand/vk-web-claude.env
    ports:
      - "3000:3000"
    networks:
      - portfolio-network
    restart: always

  # 3. phpMyAdmin (DB dashboard)
  db-dashboard:
    image: phpmyadmin:latest
    depends_on:
      portfolio-db:
        condition: service_healthy
    env_file:
      - /volume1/docker/dockhand/vk-web-claude.env
    environment:
      PMA_HOST: portfolio-db
    ports:
      - "8085:80"
    networks:
      - portfolio-network
    restart: always

volumes:
  portfolio-db-data:

networks:
  portfolio-network:
    driver: bridge
