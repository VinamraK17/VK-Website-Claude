# Docker Compose for VK Portfolio - Synology NAS / Docker deployment
# Prerequisites:
#   1. Copy .env.example to .env and fill in your real values.
#   2. Run: docker compose up -d
# Credentials are loaded from the .env file (never committed to git).
# Docker image is built automatically via GitHub Actions on every push to main.

services:

  # 1. MariaDB Database
  portfolio-db:
    image: mariadb:lts
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - portfolio-db-data:/var/lib/mysql
    networks:
      - portfolio-network
    restart: always
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Portfolio Web Server (pre-built image from GitHub Container Registry)
  portfolio-web:
    image: ghcr.io/vinamrak17/vk-website-claude:latest
    pull_policy: always
    depends_on:
      portfolio-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=production
      - ADMIN_PASSWORD=${MARIADB_PASSWORD}
    ports:
      - "3000:3000"
    networks:
      - portfolio-network
    restart: always

  # 3. phpMyAdmin (DB dashboard)
  db-dashboard:
    image: phpmyadmin:latest
    depends_on:
      portfolio-db:
        condition: service_healthy
    environment:
      PMA_HOST: portfolio-db
      PMA_USER: ${MARIADB_USER}
      PMA_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "8085:80"
    networks:
      - portfolio-network
    restart: always

volumes:
  portfolio-db-data:

networks:
  portfolio-network:
    driver: bridge
