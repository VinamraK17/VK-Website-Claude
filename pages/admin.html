<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Admin Dashboard</title>
    <meta name="robots" content="noindex, nofollow">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            }
          }
        }
      }
    </script>

    <style>
        :root {
            --surface: #080808;
            --surface2: #111111;
            --border: rgba(255,255,255,0.08);
            --ink: #ffffff;
            --ink-faint: rgba(255,255,255,0.4);
            --accent: #4ecca3;
            --danger: #ff4d4d;
        }

        body {
            background: var(--surface);
            color: var(--ink);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        /* Login screen */
        #login-screen {
            position: fixed; inset: 0; z-index: 100;
            background: var(--surface);
            display: flex; align-items: center; justify-content: center;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }

        /* Card */
        .card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 16px;
        }

        /* Tab */
        .tab-btn { transition: all 0.2s; }
        .tab-btn.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }

        /* Table */
        table { width: 100%; border-collapse: collapse; }
        th {
            font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
            color: rgba(255,255,255,0.3); font-family: 'JetBrains Mono', monospace;
            padding: 10px 14px; text-align: left;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 12px 14px; font-size: 13px; color: rgba(255,255,255,0.75);
            border-bottom: 1px solid rgba(255,255,255,0.04);
            vertical-align: top;
        }
        tr:hover td { background: rgba(255,255,255,0.02); }

        /* Message expand */
        .msg-text { max-height: 60px; overflow: hidden; transition: max-height 0.3s; cursor: pointer; }
        .msg-text.expanded { max-height: 400px; }

        /* Badge */
        .badge {
            display: inline-block; padding: 2px 10px; border-radius: 999px;
            font-size: 10px; font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;
        }

        /* Stat card */
        .stat-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        /* Input */
        input[type="password"] {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: white;
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }
        input[type="password"]:focus { border-color: var(--accent); }

        /* Pulse dot */
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.3)} }
        .pulse-dot { animation: pulse 2s ease-in-out infinite; }
    </style>
</head>
<body class="font-sans">

<!-- ── Login screen ───────────────────────────────────────────────────────── -->
<div id="login-screen">
    <div class="card p-10 w-full max-w-sm mx-4">
        <div class="mb-8">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center mb-5" style="background:rgba(78,204,163,0.1)">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="#4ecca3" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <h1 class="text-xl font-bold tracking-tight">Admin Access</h1>
            <p class="text-xs mt-1" style="color:var(--ink-faint)">VK Portfolio · Internal Dashboard</p>
        </div>
        <div class="space-y-4">
            <input type="password" id="pwd-input" placeholder="Enter admin password" class="w-full" autocomplete="current-password">
            <p id="login-error" class="text-xs hidden" style="color:var(--danger)">Incorrect password.</p>
            <button onclick="doLogin()" class="w-full py-2.5 rounded-xl text-sm font-bold uppercase tracking-wider transition-all" style="background:var(--accent);color:#050505">
                Unlock Dashboard
            </button>
        </div>
    </div>
</div>

<!-- ── Main dashboard ─────────────────────────────────────────────────────── -->
<div id="dashboard" class="hidden">

    <!-- Header -->
    <header class="sticky top-0 z-40 px-6 py-4 border-b flex items-center justify-between" style="background:var(--surface);border-color:var(--border)">
        <div class="flex items-center gap-3">
            <span class="font-bold text-lg tracking-tighter">VK</span>
            <span class="text-xs font-mono px-2 py-0.5 rounded-full border" style="color:var(--accent);border-color:var(--accent);background:rgba(78,204,163,0.08)">ADMIN</span>
        </div>
        <div class="flex items-center gap-6">
            <div id="db-indicator" class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full pulse-dot" style="background:var(--accent)"></div>
                <span class="text-xs font-mono" style="color:var(--ink-faint)">DB Live</span>
            </div>
            <button onclick="doLogout()" class="text-xs font-mono uppercase tracking-widest transition-colors hover:text-white" style="color:var(--ink-faint)">Logout</button>
        </div>
    </header>

    <!-- Stat strip -->
    <div id="stat-strip" class="grid grid-cols-2 md:grid-cols-4 gap-4 px-6 pt-6 pb-2"></div>

    <!-- Tabs -->
    <div class="px-6 mt-4 border-b flex gap-8" style="border-color:var(--border)">
        <button class="tab-btn active pb-3 text-sm font-semibold" data-tab="messages" onclick="switchTab('messages')">Messages</button>
        <button class="tab-btn pb-3 text-sm font-semibold" style="color:var(--ink-faint)" data-tab="analytics" onclick="switchTab('analytics')">Analytics</button>
    </div>

    <main class="px-6 py-6 max-w-7xl mx-auto">

        <!-- Messages tab -->
        <div id="tab-messages">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-sm font-semibold uppercase tracking-widest" style="color:var(--ink-faint)">Contact Messages</h2>
                <input type="text" id="msg-search" placeholder="Search name / email…" oninput="filterMessages()" class="text-xs font-mono px-3 py-2 rounded-lg border outline-none" style="background:rgba(255,255,255,0.04);border-color:var(--border);color:white;width:220px">
            </div>
            <div class="card overflow-hidden">
                <div class="overflow-x-auto">
                    <table id="messages-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Message</th>
                                <th>Received</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="messages-tbody">
                            <tr><td colspan="6" class="text-center py-10" style="color:var(--ink-faint)">Loading…</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <p id="messages-count" class="text-xs mt-3 font-mono" style="color:var(--ink-faint)"></p>
        </div>

        <!-- Analytics tab -->
        <div id="tab-analytics" class="hidden">
            <h2 class="text-sm font-semibold uppercase tracking-widest mb-4" style="color:var(--ink-faint)">Analytics Overview</h2>

            <!-- Page views per path -->
            <div class="card p-6 mb-6">
                <h3 class="text-xs font-mono uppercase tracking-widest mb-4" style="color:var(--accent)">Page Views by URL</h3>
                <div id="page-views-chart" class="space-y-3"></div>
            </div>

            <!-- Event summary -->
            <div class="card p-6 mb-6">
                <h3 class="text-xs font-mono uppercase tracking-widest mb-4" style="color:var(--accent)">Event Summary</h3>
                <div id="event-summary" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
            </div>

            <!-- Recent events table -->
            <div class="card overflow-hidden">
                <div class="px-5 py-4 border-b flex items-center justify-between" style="border-color:var(--border)">
                    <h3 class="text-xs font-mono uppercase tracking-widest" style="color:var(--accent)">Recent Events (last 500)</h3>
                    <input type="text" id="evt-search" placeholder="Filter events…" oninput="filterEvents()" class="text-xs font-mono px-3 py-1.5 rounded-lg border outline-none" style="background:rgba(255,255,255,0.04);border-color:var(--border);color:white;width:180px">
                </div>
                <div class="overflow-x-auto">
                    <table id="events-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Event</th>
                                <th>Details</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody id="events-tbody">
                            <tr><td colspan="4" class="text-center py-10" style="color:var(--ink-faint)">Loading…</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let TOKEN = '';
let allMessages = [];
let allEvents = [];

// ── Auth ───────────────────────────────────────────────────────────────────
async function doLogin() {
    const pwd = document.getElementById('pwd-input').value.trim();
    if (!pwd) return;

    // Validate against API
    const res = await fetch('/api/admin/messages', {
        headers: { Authorization: 'Bearer ' + pwd }
    });

    if (res.status === 401) {
        document.getElementById('login-error').classList.remove('hidden');
        return;
    }

    TOKEN = pwd;
    sessionStorage.setItem('vk_admin_token', TOKEN);
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    loadAll();
}

function doLogout() {
    TOKEN = '';
    sessionStorage.removeItem('vk_admin_token');
    location.reload();
}

document.getElementById('pwd-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
    document.getElementById('login-error').classList.add('hidden');
});

// Auto-login if token in session
window.addEventListener('DOMContentLoaded', () => {
    const saved = sessionStorage.getItem('vk_admin_token');
    if (saved) {
        TOKEN = saved;
        document.getElementById('pwd-input').value = saved;
        doLogin();
    }
});

// ── Data loading ───────────────────────────────────────────────────────────
async function loadAll() {
    await Promise.all([loadMessages(), loadAnalytics()]);
}

async function loadMessages() {
    try {
        const res = await fetch('/api/admin/messages', { headers: { Authorization: 'Bearer ' + TOKEN } });
        allMessages = await res.json();
        renderMessages(allMessages);
        updateStatStrip();
    } catch (e) {
        document.getElementById('messages-tbody').innerHTML =
            '<tr><td colspan="6" class="text-center py-8" style="color:#ff4d4d">Failed to load messages.</td></tr>';
    }
}

async function loadAnalytics() {
    try {
        const res = await fetch('/api/admin/analytics', { headers: { Authorization: 'Bearer ' + TOKEN } });
        const data = await res.json();
        allEvents = data.events || [];
        renderPageViews(data.pageViews || {});
        renderEventSummary(data.summary || {});
        renderEvents(allEvents);
        updateStatStrip();
    } catch (e) {}
}

// ── Stat strip ─────────────────────────────────────────────────────────────
function updateStatStrip() {
    const pageViews  = allEvents.filter(e => e.event === 'page_view').length;
    const linkClicks = allEvents.filter(e => e.event === 'link_click').length;
    const contacts   = allMessages.length;
    const unread     = allMessages.length; // all treated as unread for now

    const stats = [
        { label: 'Total Messages', value: contacts,   color: '#4ecca3' },
        { label: 'Page Views',     value: pageViews,  color: '#60a5fa' },
        { label: 'Link Clicks',    value: linkClicks, color: '#a78bfa' },
        { label: 'Events Logged',  value: allEvents.length, color: '#f59e0b' },
    ];

    document.getElementById('stat-strip').innerHTML = stats.map(s => `
        <div class="stat-card">
            <div class="text-2xl font-bold tracking-tight" style="color:${s.color}">${s.value}</div>
            <div class="text-xs mt-1 font-mono uppercase tracking-widest" style="color:rgba(255,255,255,0.35)">${s.label}</div>
        </div>
    `).join('');
}

// ── Messages ───────────────────────────────────────────────────────────────
function renderMessages(msgs) {
    const tbody = document.getElementById('messages-tbody');
    if (!msgs.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-10" style="color:rgba(255,255,255,0.3)">No messages yet.</td></tr>';
        document.getElementById('messages-count').textContent = '';
        return;
    }

    tbody.innerHTML = msgs.map((m, i) => `
        <tr id="msg-row-${m.id}">
            <td class="font-mono text-xs" style="color:rgba(255,255,255,0.25)">${m.id}</td>
            <td>
                <div class="font-semibold text-sm">${esc(m.name)}</div>
            </td>
            <td>
                <a href="mailto:${esc(m.email)}" class="text-sm font-mono hover:underline" style="color:#60a5fa">${esc(m.email)}</a>
            </td>
            <td style="max-width:400px">
                <div class="msg-text text-sm leading-relaxed" id="msg-txt-${m.id}" onclick="toggleMsg(${m.id})" title="Click to expand">
                    ${esc(m.message).replace(/\n/g, '<br>')}
                </div>
                <button onclick="toggleMsg(${m.id})" class="text-xs mt-1 font-mono hover:underline" id="msg-btn-${m.id}" style="color:rgba(78,204,163,0.7)">Show more</button>
            </td>
            <td class="text-xs font-mono whitespace-nowrap" style="color:rgba(255,255,255,0.35)">${formatDate(m.createdAt)}</td>
            <td>
                <button onclick="deleteMessage(${m.id})" class="text-xs font-mono px-2 py-1 rounded border transition-colors hover:bg-red-500/10" style="color:#ff4d4d;border-color:rgba(255,77,77,0.3)" title="Delete">✕</button>
            </td>
        </tr>
    `).join('');

    document.getElementById('messages-count').textContent = `${msgs.length} message${msgs.length !== 1 ? 's' : ''}`;
}

function toggleMsg(id) {
    const el = document.getElementById('msg-txt-' + id);
    const btn = document.getElementById('msg-btn-' + id);
    const expanded = el.classList.toggle('expanded');
    btn.textContent = expanded ? 'Show less' : 'Show more';
}

function filterMessages() {
    const q = document.getElementById('msg-search').value.toLowerCase();
    const filtered = allMessages.filter(m =>
        m.name.toLowerCase().includes(q) ||
        m.email.toLowerCase().includes(q) ||
        m.message.toLowerCase().includes(q)
    );
    renderMessages(filtered);
}

async function deleteMessage(id) {
    if (!confirm('Delete this message permanently?')) return;
    const res = await fetch('/api/admin/messages/' + id, {
        method: 'DELETE',
        headers: { Authorization: 'Bearer ' + TOKEN }
    });
    if (res.ok) {
        allMessages = allMessages.filter(m => m.id !== id);
        renderMessages(allMessages);
        updateStatStrip();
    }
}

// ── Analytics ──────────────────────────────────────────────────────────────
function renderPageViews(pageViews) {
    const entries = Object.entries(pageViews).sort((a, b) => b[1] - a[1]);
    const max = entries[0]?.[1] || 1;

    document.getElementById('page-views-chart').innerHTML = entries.length
        ? entries.map(([path, count]) => `
            <div class="flex items-center gap-3">
                <div class="font-mono text-xs w-36 shrink-0" style="color:rgba(255,255,255,0.5)">${path}</div>
                <div class="flex-1 h-2 rounded-full overflow-hidden" style="background:rgba(255,255,255,0.06)">
                    <div class="h-full rounded-full transition-all" style="width:${(count/max*100).toFixed(1)}%;background:#4ecca3"></div>
                </div>
                <div class="font-mono text-xs w-10 text-right" style="color:#4ecca3">${count}</div>
            </div>
        `).join('')
        : '<p class="text-xs font-mono" style="color:rgba(255,255,255,0.3)">No page view data yet.</p>';
}

function renderEventSummary(summary) {
    const colors = { page_view: '#60a5fa', link_click: '#a78bfa', contact_submit: '#4ecca3' };
    const entries = Object.entries(summary).sort((a, b) => b[1] - a[1]);

    document.getElementById('event-summary').innerHTML = entries.map(([event, count]) => `
        <div class="card p-4">
            <div class="text-xl font-bold mb-1" style="color:${colors[event] || '#f59e0b'}">${count}</div>
            <div class="text-xs font-mono uppercase tracking-wider" style="color:rgba(255,255,255,0.3)">${event.replace(/_/g,' ')}</div>
        </div>
    `).join('') || '<p class="text-xs font-mono col-span-4" style="color:rgba(255,255,255,0.3)">No events yet.</p>';
}

function renderEvents(events) {
    const tbody = document.getElementById('events-tbody');
    if (!events.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center py-10" style="color:rgba(255,255,255,0.3)">No events logged.</td></tr>';
        return;
    }

    const typeColor = { page_view: '#60a5fa', link_click: '#a78bfa', contact_submit: '#4ecca3' };

    tbody.innerHTML = events.map(e => {
        let details = '';
        try {
            const d = JSON.parse(e.details);
            details = Object.entries(d).map(([k, v]) => `<span class="mr-3"><span style="color:rgba(255,255,255,0.3)">${k}:</span> ${esc(String(v))}</span>`).join('');
        } catch { details = esc(e.details); }

        return `
            <tr>
                <td class="font-mono text-xs" style="color:rgba(255,255,255,0.25)">${e.id}</td>
                <td><span class="badge" style="background:${typeColor[e.event] || '#f59e0b'}20;color:${typeColor[e.event] || '#f59e0b'}">${e.event}</span></td>
                <td class="text-xs font-mono leading-relaxed" style="color:rgba(255,255,255,0.5);max-width:420px">${details}</td>
                <td class="text-xs font-mono whitespace-nowrap" style="color:rgba(255,255,255,0.3)">${formatDate(e.createdAt)}</td>
            </tr>
        `;
    }).join('');
}

function filterEvents() {
    const q = document.getElementById('evt-search').value.toLowerCase();
    const filtered = allEvents.filter(e =>
        e.event.toLowerCase().includes(q) ||
        e.details.toLowerCase().includes(q)
    );
    renderEvents(filtered);
}

// ── Tabs ───────────────────────────────────────────────────────────────────
function switchTab(name) {
    document.querySelectorAll('[data-tab]').forEach(btn => {
        const active = btn.dataset.tab === name;
        btn.classList.toggle('active', active);
        btn.style.color = active ? 'var(--accent)' : 'var(--ink-faint)';
    });
    document.getElementById('tab-messages').classList.toggle('hidden', name !== 'messages');
    document.getElementById('tab-analytics').classList.toggle('hidden', name !== 'analytics');
}

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(str) {
    return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-CH', { day:'2-digit', month:'short', year:'numeric' })
        + ' ' + d.toLocaleTimeString('en-CH', { hour:'2-digit', minute:'2-digit' });
}
</script>
</body>
</html>
